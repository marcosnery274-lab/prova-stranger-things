<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Contato</title>

<style>
body {
    margin: 0;
    font-family: "Verdana", "Trebuchet MS", sans-serif;
    background: linear-gradient(to right, #dbeafe, #f0f9ff);
    text-align: center;
}

h1 {
    background-color: black;
    color: #ff1e1e;
    padding: 12px;
}

/* CAIXA */
section {
    background: rgba(255, 255, 255, 0.95);
    margin: 40px auto;
    padding: 25px;
    border-radius: 12px;
    max-width: 600px;
    box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
}

/* IMAGEM */
img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 15px;
}

/* TEXTO */
p {
    font-size: 16px;
    color: #333;
}

/* FORM */
input, textarea {
    width: 90%;
    padding: 10px;
    margin: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* BOTÃO */
button {
    background: #ff1e1e;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
}

button:hover {
    background: black;
}

/* VOLTAR */
.topo {
    display: inline-block;
    margin-top: 15px;
    padding: 10px;
    background: #ff1e1e;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

.topo:hover {
    background: black;
}
</style>
</head>

<body id="topo">

<h1>Contato</h1>

<section>

<img src="img/hero.jpg">

<p>
Tem alguma dúvida, sugestão ou quer conversar sobre Stranger Things?  
Preencha o formulário abaixo e entre em contato!
</p>

<form>
Nome:<br>
<input type="text"><br>

Email:<br>
<input type="email"><br>

Mensagem:<br>
<textarea rows="4"></textarea><br><br>

<button>Enviar</button>
</form>

<a href="index.html" class="topo">⬅ Voltar para o início</a>

</section>

</body>
</html>
